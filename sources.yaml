# Phase 1 reliability profile:
# - Only 4 priority sources are enabled.
# - Non-priority sources are paused (enabled: false) and can be re-enabled in later phases.
# - Quality gate defaults: 80% price coverage + 80% location coverage.

sources:
  - name: Bristol SU Lettings - Properties To Let
    type: static_css
    enabled: true
    url: https://www.bristolsulettings.co.uk/properties-to-let
    user_agent: bristol-housing-dashboard/0.1 personal-use
    respect_robots_txt: true
    allow_if_robots_unavailable: true
    ignore_robots_restrictions: true
    fallback_to_similar_selectors: true
    enable_whole_page_block_discovery: true
    render_mode: http
    fallback_render_mode: browser
    wait_for_selector: ".property-card, .property-item, article"
    scroll_steps: 1
    min_quality_price: 0.8
    min_quality_location: 0.8
    selectors:
      card: ".property-card || .property-item || .property || article"
      title: ".property-title || h2 || h3"
      url: "a.property-link || a[href*='property'] || a[href]"
      price: ".property-price || .price || [class*='price']"
      address: ".property-address || .address || [class*='address']"
      description: ".property-description || p"
      available_from: ".available-date || [class*='available']"
      bedrooms: ".bedrooms || [class*='bed']"
      bills_included: ".bills"
      internet_included: ".internet"

  - name: HYBR - Bristol Student Rentals
