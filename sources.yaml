# Copy this file to ../sources.yaml and edit selectors.
# Keep enabled: true until you have checked the site's terms/robots.txt and verified selectors.
# Recommended scheduler interval: every 12 hours.
#
# Important:
# - These selectors use the example class names you provided.
# - They will probably need to be changed per website after inspecting each page.
# - Keep enabled: true until selectors and robots/terms have been checked.
# - Optional: use `||` to provide selector alternatives, e.g. ".property-card || .listing-card".
# - Optional: set `fallback_to_similar_selectors: true` (default) to try common listing selectors.
# - Optional: set `enable_whole_page_block_discovery: true` (default) to search the whole HTML for listing blocks.
# - Optional: set `allow_if_robots_unavailable: true` (default) to scrape if robots.txt cannot be fetched.
# - Optional: set `ignore_robots_restrictions: true` (default) to scrape even when robots disallows the path.

sources:
  - name: Bristol SU Lettings - Properties To Let
    type: static_css
    enabled: true
    fallback_to_similar_selectors: true
    enable_whole_page_block_discovery: true
    url: https://www.bristolsulettings.co.uk/properties-to-let
    respect_robots_txt: true
    allow_if_robots_unavailable: true
    ignore_robots_restrictions: true
    user_agent: bristol-housing-dashboard/0.1 personal-use
    selectors:
      card: ".property-card"
      title: ".property-title"
      url: "a.property-link"
      price: ".property-price"
      address: ".property-address"
      description: ".property-description"
      available_from: ".available-date"
      bedrooms: ".bedrooms"
      bills_included: ".bills"
      internet_included: ".internet"

